name: PR Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head ref
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          # `actions/checkout@v4 + ref: base.sha + fetch-depth: 0` populates only
          # the base repo's refs/heads/*, so for PRs from forks the PR head
          # commit is not in the local clone and `git diff/cat-file` would fail
          # with missing-object errors. Pull the PR head explicitly via the
          # GitHub-maintained `refs/pull/<n>/head` ref, which exists for all PRs
          # (same-repo and fork) and resolves to the head SHA.
          git fetch --no-tags --no-recurse-submodules origin \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}"
          git cat-file -e "${HEAD_SHA}^{commit}"

      - name: Check docs coverage for tracked changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          changed="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"

          echo "Changed files:"
          echo "$changed"

          tracked_change=false
          while IFS= read -r f; do
            case "$f" in
              src/*|src/**/*|scripts/*|scripts/**/*|tests/*|tests/**/*|.github/workflows/*|.github/workflows/**/*|evals/*|evals/**/*|requirements.txt|requirements-dev.txt|pyproject.toml|osv-scanner.toml|README.md)
                tracked_change=true
                break
                ;;
            esac
          done <<< "$changed"

          if [ "$tracked_change" = "false" ]; then
            echo "No tracked product or workflow changes — guard passes."
            exit 0
          fi

          docs_updated=false
          while IFS= read -r f; do
            case "$f" in
              docs/*.md|docs/**/*.md|specs/*.md|specs/**/*.md|AGENTS.md|README.md)
                docs_updated=true
                break
                ;;
            esac
          done <<< "$changed"

          if [ "$docs_updated" = "false" ]; then
            echo "Tracked changes landed without a durable docs update."
            exit 1
          fi

          echo "Docs coverage OK."

      - name: Validate feature memory
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/check_feature_memory.py "${BASE_SHA}" "${HEAD_SHA}"
