name: AI Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to route and validate
        required: true
        type: string
      trigger_mode:
        description: Review gate trigger mode (gemini/codex only; ignored for claude)
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: >-
    ai-review-${{ github.event_name }}-${{
      github.event.pull_request.number ||
      inputs.pr_number ||
      github.ref
    }}
  cancel-in-progress: true

jobs:
  ai-review:
    # The job ALWAYS runs for non-draft PRs and workflow_dispatch.
    # Agent selection is validated inside the policy step so that
    # unsupported AI_REVIEW_AGENT values fail the check instead of
    # being silently skipped (skipped jobs report success for
    # required checks, which would reintroduce a merge-bypass path).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false
      )
    name: AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve PR context
        id: pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_PR_NUMBER: ${{ inputs.pr_number }}
        run: node scripts/resolve-pr-context.mjs

      - name: Detect bootstrap review-infrastructure PR
        id: bootstrap
        if: steps.pr.outputs.is_pull_request == 'true'
        uses: actions/github-script@v8
        env:
          AI_REVIEW_PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        with:
          script: |
            const prNumber = process.env.AI_REVIEW_PR_NUMBER;
            if (!prNumber) {
              core.setOutput("skip", "false");
              return;
            }
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prNumber),
              per_page: 100,
            });
            const bootstrapFiles = new Set([
              ".github/workflows/ai-review.yml",
              ".github/workflows/ai-command-policy.yml",
              "scripts/ai-review-gate.mjs",
              "scripts/ai-review-helpers.mjs",
              "scripts/resolve-pr-context.mjs",
            ]);
            const touchesBootstrap = files.some((file) =>
              bootstrapFiles.has(file.filename),
            );
            core.setOutput("skip", touchesBootstrap ? "true" : "false");

      - name: Explain bootstrap skip
        if: steps.bootstrap.outputs.skip == 'true'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## AI Review"
            echo ""
            echo "AI Review gate was skipped for this PR because the gate workflow or its scripts are being introduced or changed."
            echo "The gate cannot reliably review a change to itself."
            echo "After this PR lands on \`main\`, the next PR will use the full AI Review gate."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve selected review policy
        id: policy
        if: steps.bootstrap.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          selected="${{ vars.AI_REVIEW_AGENT }}"
          if [ -z "$selected" ]; then
            selected="codex"
          fi

          # tone-of-voice is codex-only by repository policy. Any other
          # value (including typos) must fail closed: silently skipping
          # would let the required AI Review check report success
          # without an actual review running.
          if [ "$selected" != "codex" ]; then
            echo "::error::Unsupported AI_REVIEW_AGENT value: '$selected'. Allowed: 'codex' (or unset, which defaults to codex)."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            trigger_mode="${{ inputs.trigger_mode || 'skip' }}"
          else
            # Codex and Gemini both reject bot-posted trigger comments on
            # pull_request events. Only Gemini Code Assist auto-reviews on
            # PR open; codex requires a human-authored `@codex review`
            # comment on every review iteration. The gate stays in
            # skip mode and polls for the latest native review on the
            # current head SHA. See specs/005-ai-review-codex-gate/spec.md.
            trigger_mode="skip"
          fi

          echo "selected_agent=$selected" >> "$GITHUB_OUTPUT"
          echo "trigger_mode=$trigger_mode" >> "$GITHUB_OUTPUT"

          {
            echo "## AI Review policy"
            echo ""
            echo "- selected agent: \`$selected\`"
            echo "- trigger mode: \`$trigger_mode\`"
            echo "- event: \`${{ github.event_name }}\`"
            echo ""
            echo "See specs/005-ai-review-codex-gate/spec.md for the gate contract."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Mark native review start
        id: start
        if: steps.bootstrap.outputs.skip != 'true'
        run: echo "triggered_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Route and validate selected native review
        if: steps.bootstrap.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_AGENT: ${{ steps.policy.outputs.selected_agent }}
          AI_REVIEW_PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          AI_REVIEW_TRIGGER_MODE: ${{ steps.policy.outputs.trigger_mode }}
          AI_REVIEW_TRIGGERED_AT: ${{ steps.start.outputs.triggered_at }}
          AI_REVIEW_WAIT_MS: "1200000"
          AI_REVIEW_POLL_MS: "15000"
        run: node scripts/ai-review-gate.mjs
