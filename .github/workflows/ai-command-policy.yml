name: AI Command Policy

on:
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

# Serialize command-policy jobs per PR/issue. Trusted reviewers can
# legitimately issue multiple `@codex review` / `@claude review` commands
# in quick succession; without a concurrency group, each new command
# races the previous one and posts duplicate request markers. Cancel-in-
# progress collapses bursts to the latest command, which is the desired
# behaviour for the routing layer.
concurrency:
  group: >-
    ai-command-policy-${{
      github.event.issue.number || github.ref
    }}
  cancel-in-progress: true

jobs:
  ai-command-policy:
    name: ai-command-policy
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.comment.body, '@codex') ||
        contains(github.event.comment.body, '/gemini review') ||
        contains(github.event.comment.body, '@gemini-code-assist review')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted policy scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Validate trusted actor and record review request
        run: node scripts/ai-command-policy.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_IMPLEMENTATION_AGENT: ${{ vars.AI_IMPLEMENTATION_AGENT }}
          AI_REVIEW_AGENT: ${{ vars.AI_REVIEW_AGENT }}
