name: AI Command Policy

on:
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

# Serialize command-policy jobs per PR/issue WITHOUT cancel-in-progress.
# The workflow `if` filter accepts any non-bot commenter whose body
# contains `@codex`/`@claude`/`/gemini review`; trust enforcement lives
# downstream in scripts/ai-command-policy.mjs. With cancel-in-progress
# enabled, an untrusted commenter could spam command-like comments to
# cancel an in-progress trusted routing job before it records the
# request marker or kicks the AI Review rerun, stranding the required
# gate. Queueing instead lets trusted jobs run to completion and lets
# untrusted entrants fail the downstream trust check on their own turn.
concurrency:
  group: >-
    ai-command-policy-${{
      github.event.issue.number || github.ref
    }}
  cancel-in-progress: false

jobs:
  ai-command-policy:
    name: ai-command-policy
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.comment.body, '@codex') ||
        contains(github.event.comment.body, '/gemini review') ||
        contains(github.event.comment.body, '@gemini-code-assist review')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted policy scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Validate trusted actor and record review request
        run: node scripts/ai-command-policy.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_IMPLEMENTATION_AGENT: ${{ vars.AI_IMPLEMENTATION_AGENT }}
          AI_REVIEW_AGENT: ${{ vars.AI_REVIEW_AGENT }}
