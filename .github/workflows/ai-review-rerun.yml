name: AI Review Rerun

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    # `edited` is deliberately omitted: a trusted bot (or a compromised
    # bot token) editing an old comment must not re-trigger the rerun
    # pipeline for the same SHA. Acting only on freshly created comments
    # makes the rerun strictly monotonic in event flow. scripts/ai-review-rerun.mjs
    # enforces the same guard with `event.action !== 'edited'` so both
    # layers fail closed if the workflow-level filter is bypassed.
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: read
  pull-requests: read

# Serialize reruns per pull-request. Without this, multiple trusted
# review/comment events for the same PR can spawn parallel rerun jobs,
# each racing to dispatch /rerun against the same workflow run. The
# cancel-in-progress strategy keeps only the latest rerun request alive,
# which matches the underlying semantics: there is one head SHA per PR
# at any moment, and the most recent evidence is the only one that needs
# to be acted on.
concurrency:
  group: >-
    ai-review-rerun-${{
      github.event.pull_request.number ||
      github.event.issue.number ||
      github.ref
    }}
  cancel-in-progress: true

jobs:
  ai-review-rerun:
    name: ai-review-rerun
    if: |
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.user.type == 'Bot'
      ) ||
      (
        github.event.issue.pull_request &&
        github.event.comment.user.type == 'Bot' &&
        (
          startsWith(github.event.comment.body, 'Codex Review:') ||
          contains(github.event.comment.body, 'AI_REVIEW_OUTCOME:')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted rerun scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Rerun AI Review for trusted evidence
        run: node scripts/ai-review-rerun.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_AGENT: ${{ vars.AI_REVIEW_AGENT }}
