name: AI Review Rerun

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    # `edited` is deliberately omitted: a trusted bot (or a compromised
    # bot token) editing an old comment must not re-trigger the rerun
    # pipeline for the same SHA. Acting only on freshly created comments
    # makes the rerun strictly monotonic in event flow. scripts/ai-review-rerun.mjs
    # enforces the same guard with `event.action !== 'edited'` so both
    # layers fail closed if the workflow-level filter is bypassed.
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: read
  pull-requests: read

# Serialize reruns per pull-request WITHOUT cancel-in-progress. The
# workflow-level `if` filter requires `user.type == 'Bot'` plus a body
# prefix match, but a non-Codex bot (e.g. a misconfigured integration
# or a future supply-chain compromise) could legitimately post a
# `Codex Review:`-prefixed comment and enter this job. With cancel-in-
# progress enabled, that bot could repeatedly cancel an in-progress
# trusted rerun job. The downstream guard in scripts/ai-review-rerun.mjs
# (`isTrustedReviewLogin`) refuses to act on untrusted bots, so the
# safest concurrency strategy is to queue rather than cancel — trusted
# jobs complete, untrusted jobs run after and no-op on the trust check.
concurrency:
  group: >-
    ai-review-rerun-${{
      github.event.pull_request.number ||
      github.event.issue.number ||
      github.ref
    }}
  cancel-in-progress: false

jobs:
  ai-review-rerun:
    name: ai-review-rerun
    if: |
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.user.type == 'Bot'
      ) ||
      (
        github.event.issue.pull_request &&
        github.event.comment.user.type == 'Bot' &&
        (
          startsWith(github.event.comment.body, 'Codex Review:') ||
          contains(github.event.comment.body, 'AI_REVIEW_OUTCOME:')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted rerun scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Check trusted rerun script availability
        id: rerun_script
        shell: bash
        run: |
          if [ -f scripts/ai-review-rerun.mjs ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Trusted base does not contain scripts/ai-review-rerun.mjs yet; skipping bootstrap rerun."
          fi

      - name: Rerun AI Review for trusted evidence
        if: steps.rerun_script.outputs.available == 'true'
        run: node scripts/ai-review-rerun.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_AGENT: ${{ vars.AI_REVIEW_AGENT }}
