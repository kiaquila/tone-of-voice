name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy from main history
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production

    steps:
      - name: Checkout release revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "archive=$RUNNER_TEMP/tone-of-voice-release.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output "${{ steps.release.outputs.archive }}" HEAD

      - name: Upload release artifact
        id: artifact
        shell: bash
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          key="tone-of-voice/releases/${RELEASE_SHA}.tar.gz"
          aws s3 cp "${{ steps.release.outputs.archive }}" "s3://${{ vars.DEPLOY_S3_BUCKET }}/${key}"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "url=$(aws s3 presign "s3://${{ vars.DEPLOY_S3_BUCKET }}/${key}" --expires-in 3600)" >> "$GITHUB_OUTPUT"

      - name: Send production deploy command
        id: ssm
        shell: bash
        env:
          DEPLOY_TARGET_DIR: ${{ vars.DEPLOY_TARGET_DIR }}
          DEPLOY_INSTANCE_ID: ${{ vars.DEPLOY_INSTANCE_ID }}
          BOT_ENV_FILE: ${{ vars.BOT_ENV_FILE }}
          BOT_ALLOWED_CHAT_IDS: ${{ vars.BOT_ALLOWED_CHAT_IDS }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_URL: ${{ steps.artifact.outputs.url }}
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/remote-deploy.sh" <<'EOF'
          set -euo pipefail

          tmp_dir="/tmp/tone-of-voice-deploy-${RELEASE_SHA}"
          archive_path="${tmp_dir}/release.tar.gz"

          rm -rf "$tmp_dir"
          mkdir -p "$tmp_dir"

          ARCHIVE_PATH="$archive_path" RELEASE_URL="$RELEASE_URL" python3 - <<'PY'
          import os
          import urllib.request

          urllib.request.urlretrieve(os.environ["RELEASE_URL"], os.environ["ARCHIVE_PATH"])
          PY

          tar -xzf "$archive_path" -C "$tmp_dir"
          chmod +x "$tmp_dir/scripts/deploy_release.sh"

          sudo -u ubuntu -H env \
            TARGET_DIR="$DEPLOY_TARGET_DIR" \
            RELEASE_SHA="$RELEASE_SHA" \
            RELEASE_SOURCE_DIR="$tmp_dir" \
            BOT_ENV_FILE="${BOT_ENV_FILE:-}" \
            BOT_ALLOWED_CHAT_IDS="${BOT_ALLOWED_CHAT_IDS:-}" \
            bash "$tmp_dir/scripts/deploy_release.sh"

          rm -rf "$tmp_dir"
          EOF

          REMOTE_SCRIPT_B64=$(base64 < "$RUNNER_TEMP/remote-deploy.sh" | tr -d '\n')

          cat > "$RUNNER_TEMP/ssm-params.json" <<EOF
          {
            "commands": [
              "export RELEASE_SHA='${RELEASE_SHA}'",
              "export RELEASE_URL='${RELEASE_URL}'",
              "export DEPLOY_TARGET_DIR='${DEPLOY_TARGET_DIR}'",
              "export BOT_ENV_FILE='${BOT_ENV_FILE}'",
              "export BOT_ALLOWED_CHAT_IDS='${BOT_ALLOWED_CHAT_IDS}'",
              "printf '%s' '${REMOTE_SCRIPT_B64}' | base64 -d > /tmp/run-tone-of-voice-deploy.sh",
              "bash /tmp/run-tone-of-voice-deploy.sh"
            ]
          }
          EOF

          command_id=$(
            aws ssm send-command \
              --instance-ids "$DEPLOY_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy tone-of-voice ${RELEASE_SHA}" \
              --parameters "file://$RUNNER_TEMP/ssm-params.json" \
              --timeout-seconds 1800 \
              --query "Command.CommandId" \
              --output text
          )

          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy completion
        shell: bash
        env:
          DEPLOY_INSTANCE_ID: ${{ vars.DEPLOY_INSTANCE_ID }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          set -euo pipefail

          # SSM send-command above runs with --timeout-seconds 1800 (30 min).
          # Poll for at least that long plus a margin so SSM itself can flip
          # to TimedOut and surface the real reason instead of the workflow
          # giving up first and reporting a false-positive deploy failure.
          for _ in {1..130}; do
            status=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DEPLOY_INSTANCE_ID" --query 'Status' --output text 2>/dev/null || true)

            case "$status" in
              Success)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DEPLOY_INSTANCE_ID" --query 'StandardOutputContent' --output text
                exit 0
                ;;
              Pending|InProgress|Delayed|"")
                sleep 15
                ;;
              *)
                echo "Deploy failed with status: $status"
                echo "--- stdout ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DEPLOY_INSTANCE_ID" --query 'StandardOutputContent' --output text || true
                echo "--- stderr ---"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DEPLOY_INSTANCE_ID" --query 'StandardErrorContent' --output text || true
                exit 1
                ;;
            esac
          done

          echo "Deploy timed out waiting for SSM command completion."
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DEPLOY_INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DEPLOY_INSTANCE_ID" --query 'StandardErrorContent' --output text || true
          exit 1
