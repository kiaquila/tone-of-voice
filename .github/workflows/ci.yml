name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline-checks:
    name: baseline-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Validate Python syntax
        run: python -m py_compile scripts/*.py src/tone_of_voice/*.py tests/*.py

      - name: Run unit tests
        run: python -m pytest tests

      - name: Smoke-check CLI help
        run: |
          python scripts/export_telegram_posts.py --help
          python scripts/build_telegram_metrics.py --help
          python scripts/draft_post.py --help
