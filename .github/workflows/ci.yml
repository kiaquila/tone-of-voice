name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline-checks:
    name: baseline-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Validate Python syntax
        run: python -m py_compile scripts/*.py src/tone_of_voice/*.py tests/*.py

      - name: Run unit tests
        run: python -m pytest tests

      - name: Run regression eval slice
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          should_run=false
          if [ "$EVENT_NAME" = "push" ]; then
            should_run=true
          else
            changed="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
            while IFS= read -r f; do
              case "$f" in
                pyproject.toml|src/tone_of_voice/bot.py|src/tone_of_voice/config.py|src/tone_of_voice/drafting.py|src/tone_of_voice/feedback.py|src/tone_of_voice/evals.py|scripts/draft_post.py|scripts/capture_feedback.py|scripts/run_regression_evals.py|evals/regression/*|docs/00-principles.md|docs/01-current-voice-snapshot.md|docs/04-platform-adaptation.md|docs/10-reference-library.md|docs/12-stop-list.md|docs/13-drafting-recipes.md)
                  should_run=true
                  break
                  ;;
              esac
            done <<< "$changed"
          fi

          if [ "$should_run" = "false" ]; then
            echo "No drafting, voice-memory, or eval changes detected; skipping regression eval slice."
            exit 0
          fi

          python scripts/run_regression_evals.py

      - name: Run retrieval experiment slice
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          should_run=false
          if [ "$EVENT_NAME" = "push" ]; then
            should_run=true
          else
            changed="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")"
            while IFS= read -r f; do
              case "$f" in
                pyproject.toml|src/tone_of_voice/bot.py|src/tone_of_voice/config.py|src/tone_of_voice/evals.py|src/tone_of_voice/style_memory.py|src/tone_of_voice/retrieval_experiments.py|src/tone_of_voice/drafting.py|scripts/run_retrieval_experiments.py|scripts/build_style_memory_index.py|scripts/query_style_memory.py|evals/retrieval/*|docs/10-reference-library.md|docs/00-principles.md|docs/01-current-voice-snapshot.md|docs/04-platform-adaptation.md|docs/12-stop-list.md|docs/13-drafting-recipes.md|docs/17-rag-style-memory.md)
                  should_run=true
                  break
                  ;;
              esac
            done <<< "$changed"
          fi

          if [ "$should_run" = "false" ]; then
            echo "No style-memory, retrieval, or voice-doc changes detected; skipping retrieval experiment slice."
            exit 0
          fi

          python scripts/run_retrieval_experiments.py

      - name: Smoke-check CLI help
        run: |
          python scripts/export_telegram_posts.py --help
          python scripts/build_telegram_metrics.py --help
          python scripts/build_style_memory_index.py --help
          python scripts/query_style_memory.py --help
          python scripts/draft_post.py --help
          python scripts/capture_feedback.py --help
          python scripts/summarize_feedback.py --help
          python scripts/run_regression_evals.py --help
          python scripts/run_retrieval_experiments.py --help
          python scripts/run_telegram_bot.py --help
          python scripts/smoke_telegram_bot.py --help
